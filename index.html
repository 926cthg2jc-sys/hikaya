<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hekaya小故事｜个人书架</title>
    <style>
        *{ margin:0; padding:0; box-sizing:border-box; font-family:"Microsoft YaHei", system-ui, sans-serif; }
        :root{
            --bg:#f5f3ef; --card-bg:#ffffff; --text-color:#2d2d2d; --sub-text:#6b6b6b;
            --primary:#6c5ce7; --primary-light:#a29bfe; --primary-gradient:linear-gradient(135deg,#6c5ce7,#a29bfe);
            --secondary-gradient:linear-gradient(135deg,#fd79a8,#fab1a0); --accent-gradient:linear-gradient(135deg,#00b894,#00cec9);
            --border:#e8e8e8; --shadow:0 4px 15px rgba(0,0,0,0.06); --shadow-hover:0 12px 40px rgba(108,92,231,0.15);
            --success:#00b894; --warning:#fdcb6e; --error:#ff6b6b; --info:#74b9ff;
            --radius-sm:10px; --radius-md:16px; --radius-lg:24px; --radius-xl:32px;
            --transition-fast:0.2s ease; --transition-normal:0.3s ease; --transition-slow:0.5s ease;
        }
        .dark{
            --bg:#0d0d0d; --card-bg:#1a1a2e; --text-color:#f8f8f8; --sub-text:#888888;
            --primary:#a29bfe; --primary-light:#6c5ce7; --primary-gradient:linear-gradient(135deg,#a29bfe,#6c5ce7);
            --border:#2d2d44; --shadow:0 4px 15px rgba(0,0,0,0.2); --shadow-hover:0 12px 40px rgba(108,92,231,0.3);
        }
        body{ background:var(--bg); color:var(--text-color); min-height:100vh; overflow-x:hidden; overflow-y:auto; }
        
        .modal-overlay{
            position:fixed; top:0; left:0; width:100%; height:100%;
            background:rgba(0,0,0,0.5); backdrop-filter: blur(15px); z-index:10000;
            display:flex; align-items:center; justify-content:center; padding:20px; margin:0;
        }
        .reading-overlay{
            position:fixed !important; top:0 !important; left:0 !important; width:100% !important; height:100vh !important;
            background:rgba(0,0,0,0.5) !important; backdrop-filter: blur(15px) !important; z-index:10000 !important;
            padding:20px !important; margin:0 !important;
            overflow-y:auto !important;
            display:block !important;
            align-items:normal !important;
            justify-content:normal !important;
        }

        #welcomePage{
            position:fixed; top:0; left:0; right:0; bottom:0;
            background:#1a2f23; display:flex; align-items:center; justify-content:center;
            padding:40px 20px; z-index:100;
        }
        #welcomePage.hidden{ display:none; }
        
        .welcome-container{
            background:#1a2f23; border-radius:24px; padding:60px 80px;
            max-width:900px; width:100%; box-shadow:0 20px 60px rgba(0,0,0,0.4); position:relative;
        }
        .welcome-top-label{ text-align:center; color:#6b8e7b; font-size:12px; letter-spacing:3px; margin-bottom:20px; text-transform:uppercase; }
        .welcome-title{ text-align:center; color:#fff; font-size:36px; font-weight:700; margin-bottom:50px; letter-spacing:-1px; }
        
        .welcome-books-container{
            display:flex; justify-content:center; align-items:flex-end; gap:-20px;
            margin-bottom:30px; perspective:1000px;
        }
        .welcome-book-cover{
            width:140px; height:200px; border-radius:8px; overflow:hidden;
            box-shadow:0 10px 30px rgba(0,0,0,0.3); transition:transform 0.3s ease;
            cursor:pointer; position:relative;
        }
        .welcome-book-cover:hover{ transform:translateY(-10px) scale(1.05); z-index:10; }
        .welcome-book-cover img{ width:100%; height:100%; object-fit:cover; }
        .welcome-book-cover:nth-child(1){ transform:rotate(-8deg) translateX(20px); }
        .welcome-book-cover:nth-child(2){ transform:rotate(-4deg) translateX(10px); }
        .welcome-book-cover:nth-child(3){ transform:rotate(2deg); }
        .welcome-book-cover:nth-child(4){ transform:rotate(6deg) translateX(-10px); }
        .welcome-book-cover:hover:nth-child(1){ transform:rotate(-5deg) translateX(20px) translateY(-10px) scale(1.05); }
        .welcome-book-cover:hover:nth-child(2){ transform:rotate(-2deg) translateX(10px) translateY(-10px) scale(1.05); }
        .welcome-book-cover:hover:nth-child(3){ transform:rotate(0deg) translateY(-10px) scale(1.05); }
        .welcome-book-cover:hover:nth-child(4){ transform:rotate(4deg) translateX(-10px) translateY(-10px) scale(1.05); }
        
        .welcome-meta-info{ text-align:center; color:#6b8e7b; font-size:13px; margin-bottom:40px; letter-spacing:1px; }
        
        .welcome-edit-btn, .welcome-login-btn{
            position:absolute; top:20px; right:20px; padding:10px 20px;
            background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.2);
            border-radius:20px; color:#fff; font-size:13px; cursor:pointer; transition:all 0.3s ease;
        }
        .welcome-edit-btn:hover, .welcome-login-btn:hover{ background:rgba(255,255,255,0.2); }
        .welcome-edit-btn{ display:none; }
        .admin-login .welcome-edit-btn{ display:block; }
        .admin-login .welcome-login-btn{ display:none; }
        
        .start-reading-btn{
            display:flex; width:50px; height:50px; margin:20px auto 0; padding:0;
            background:#4a9060; border:none; border-radius:50%; color:#fff; font-size:20px;
            cursor:pointer; transition:all 0.3s ease; align-items:center; justify-content:center;
        }
        .start-reading-btn:hover{ background:#3a8050; transform:translateY(-2px) scale(1.1); box-shadow:0 5px 20px rgba(74,144,96,0.3); }
        
        .welcome-modal-content{ background:#2a4535; border-radius:20px; padding:40px; max-width:600px; width:100%; max-height:80vh; overflow-y:auto; position:relative; color:#fff; scrollbar-width:thin; scrollbar-color:#4a9060 #1a2f23; }
        .welcome-modal-content::-webkit-scrollbar{ width:6px; }
        .welcome-modal-content::-webkit-scrollbar-track{ background:#1a2f23; border-radius:3px; }
        .welcome-modal-content::-webkit-scrollbar-thumb{ background:#4a9060; border-radius:3px; }
        .welcome-modal-content::-webkit-scrollbar-thumb:hover{ background:#3a8050; }
        .welcome-modal-title{ font-size:24px; font-weight:600; margin-bottom:30px; text-align:center; }
        .welcome-close-modal-btn{ position:absolute; top:15px; right:15px; background:none; border:none; color:#fff; font-size:28px; cursor:pointer; width:35px; height:35px; display:flex; align-items:center; justify-content:center; }
        .welcome-form-group{ margin-bottom:20px; }
        .welcome-form-group label{ display:block; font-size:14px; color:#6b8e7b; margin-bottom:8px; }
        .welcome-form-group input{ width:100%; padding:12px 15px; background:#1a2f23; border:1px solid rgba(255,255,255,0.1); border-radius:10px; color:#fff; font-size:14px; outline:none; }
        .welcome-form-group input:focus{ border-color:#4a9060; }
        .welcome-book-preview{ display:flex; gap:10px; margin-bottom:20px; flex-wrap:wrap; }
        .welcome-add-form{ background:rgba(255,255,255,0.05); padding:20px; border-radius:10px; margin-top:15px; }
        .welcome-meta-preview{ display:flex; flex-direction:column; gap:10px; margin-bottom:15px; }
        .welcome-meta-item{ display:flex; gap:10px; align-items:center; }
        .welcome-meta-item input{ flex:1; padding:10px 12px; background:#1a2f23; border:1px solid rgba(255,255,255,0.1); border-radius:8px; color:#fff; font-size:13px; outline:none; }
        .welcome-meta-item input:focus{ border-color:#4a9060; }
        .welcome-add-meta{ display:flex; gap:10px; }
        .welcome-add-meta input{ flex:1; padding:10px 12px; background:#1a2f23; border:1px solid rgba(255,255,255,0.1); border-radius:8px; color:#fff; font-size:13px; outline:none; }
        .welcome-preview-item{ width:80px; height:110px; border-radius:6px; overflow:hidden; position:relative; border:2px solid transparent; cursor:pointer; }
        .welcome-preview-item.selected{ border-color:#4a9060; }
        .welcome-preview-item img{ width:100%; height:100%; object-fit:cover; }
        .welcome-preview-item .welcome-edit-btn{ position:absolute; top:5px; left:5px; width:20px; height:20px; background:rgba(74,144,96,0.8); border:none; color:#fff; font-size:10px; cursor:pointer; border-radius:50%; display:flex; align-items:center; justify-content:center; }
        .welcome-preview-item .welcome-remove-btn{ position:absolute; top:5px; right:5px; width:20px; height:20px; background:rgba(0,0,0,0.7); border:none; color:#fff; font-size:12px; cursor:pointer; border-radius:50%; display:flex; align-items:center; justify-content:center; }
        .welcome-link-info{ font-size:10px; color:#666; margin-top:4px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
        .welcome-upload-btn{ display:block; width:100%; padding:12px; background:#4a9060; border:none; border-radius:10px; color:#fff; font-size:14px; cursor:pointer; margin-bottom:15px; }
        .welcome-upload-btn:hover{ background:#3a8050; }
        .welcome-save-btn{ display:block; width:100%; padding:14px; background:#4a9060; border:none; border-radius:10px; color:#fff; font-size:16px; font-weight:600; cursor:pointer; }
        .welcome-save-btn:hover{ background:#3a8050; }
        .welcome-login-form{ text-align:center; }
        .welcome-login-form input{ width:100%; padding:12px 15px; background:#1a2f23; border:1px solid rgba(255,255,255,0.1); border-radius:10px; color:#fff; font-size:14px; outline:none; margin-bottom:15px; }
        .welcome-login-form input:focus{ border-color:#4a9060; }
        .welcome-login-form button{ width:100%; padding:14px; background:#4a9060; border:none; border-radius:10px; color:#fff; font-size:16px; font-weight:600; cursor:pointer; }

        #bookshelfPage{ display:none; }
        #bookshelfPage.active{ display:block; }
        
        .main-content{ zoom:0.8; }
        
        .header{ display:flex; align-items:center; justify-content:space-between; padding:20px 30px; background:var(--card-bg); border-radius:var(--radius-lg); box-shadow:var(--shadow); margin-bottom:30px; }
        .logo{ font-size:24px; font-weight:700; background:var(--primary-gradient); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; cursor:pointer; }
        .header-right{ display:flex; align-items:center; gap:15px; }
        .theme-toggle-btn{
            width:40px; height:40px; border:none; border-radius:50%;
            background:var(--card-bg); border:1px solid var(--border);
            font-size:18px; cursor:pointer; transition:var(--transition-normal);
            display:flex; align-items:center; justify-content:center;
        }
        .theme-toggle-btn:hover{ transform:rotate(20deg); border-color:var(--primary); }
        
        .btn-common{ padding:12px 24px; border:none; border-radius:var(--radius-md); font-size:14px; font-weight:600; cursor:pointer; transition:var(--transition-normal); }
        .btn-primary{ background:var(--primary-gradient); color:#fff; }
        .btn-primary:hover{ transform:translateY(-2px); box-shadow:var(--shadow-hover); }
        .btn-outline{ background:transparent; border:2px solid var(--primary); color:var(--primary); }
        .btn-outline:hover{ background:var(--primary); color:#fff; }
        .btn-secondary{ background:var(--secondary-gradient); color:#fff; }
        .btn-sm{ padding:8px 16px; font-size:12px; }
        
        .search-box{ max-width:500px; width:100%; margin:0 auto 25px; position:relative; }
        #searchInput{ width:100%; padding:16px 20px 16px 50px; border:1px solid var(--border); border-radius:var(--radius-xl); font-size:15px; background:var(--card-bg); color:var(--text-color); box-shadow: inset 0 2px 5px rgba(0,0,0,0.05); }
        #searchInput:focus{ outline:none; border-color:var(--primary); box-shadow:0 0 0 3px rgba(141,110,99,0.2), inset 0 2px 5px rgba(0,0,0,0.05); }
        .search-icon{ position:absolute; left:20px; top:50%; transform:translateY(-50%); color:var(--sub-text); font-size:18px; }
        .search-result-count{ text-align:center; font-size:14px; color:var(--sub-text); margin-bottom:20px; min-height:20px; }
        
        .category-tabs{ display:flex; justify-content:center; flex-wrap:wrap; gap:12px; margin-bottom:25px; }
        .tab{ padding:12px 24px; background:var(--card-bg); border:1px solid var(--border); border-radius:var(--radius-xl); font-size:15px; color:var(--text-color); cursor:pointer; transition:var(--transition-normal); }
        .tab:hover{ border-color:var(--primary); color:var(--primary); }
        .tab.active{ background:var(--primary-gradient); color:#fff; border:none; }
        
        .sort-box{ display:flex; justify-content:center; margin-bottom:20px; }
        #sortSelect{ padding:10px 20px; background:var(--card-bg); border:1px solid var(--border); border-radius:var(--radius-md); color:var(--text-color); font-size:14px; cursor:pointer; outline:none; }
        
        .bookshelf{ display:grid; grid-template-columns:repeat(6, 1fr); gap:20px; padding:0; max-width:1200px; margin:0 auto; }
        .book-card{ background:var(--card-bg); border-radius:var(--radius-lg); overflow:hidden; box-shadow:var(--shadow); transition:var(--transition-normal); position:relative; cursor:pointer; }
        .book-card:hover{ transform:translateY(-8px); box-shadow:var(--shadow-hover); }
        .book-card.top{ border:2px solid var(--primary); }
        .book-cover{ width:100%; height:260px; object-fit:cover; display:block; }
        .book-info{ padding:15px; text-align:center; }
        .book-title{ font-size:15px; font-weight:600; color:var(--text-color); margin-bottom:8px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; text-align:center; }
        .book-cate{ font-size:12px; color:var(--sub-text); padding:4px 10px; background:rgba(108,92,231,0.1); border-radius:var(--radius-sm); display:inline-block; }
        
        .top-tag{ position:absolute; top:10px; left:10px; background:var(--primary-gradient); color:#fff; padding:4px 12px; border-radius:var(--radius-sm); font-size:12px; font-weight:600; z-index:2; }
        .top-btn, .del-btn, .edit-card-btn{
            position:absolute; width:35px; height:35px; border:none; border-radius:50%; font-size:16px; cursor:pointer; transition:var(--transition-fast); display:none; align-items:center; justify-content:center;
        }
        .top-btn{ top:10px; right:10px; background:rgba(255,255,255,0.9); }
        .del-btn{ bottom:10px; right:10px; background:rgba(255,107,107,0.9); color:#fff; }
        .edit-card-btn{ bottom:10px; right:50px; background:rgba(108,92,231,0.9); color:#fff; font-size:14px; }
        .admin-btns-show .top-btn, .admin-btns-show .del-btn, .admin-btns-show .edit-card-btn{ display:flex; }
        
        .upload-box{ background:var(--card-bg); border-radius:var(--radius-lg); padding:30px; box-shadow:var(--shadow); margin-bottom:30px; max-width:600px; margin-left:auto; margin-right:auto; }
        .upload-box h3{ font-size:20px; margin-bottom:25px; color:var(--text-color); }
        .form-group{ margin-bottom:20px; }
        .form-group input, .form-group select{ width:100%; padding:14px 18px; border:1px solid var(--border); border-radius:var(--radius-md); font-size:14px; background:var(--card-bg); color:var(--text-color); outline:none; }
        .form-group input:focus, .form-group select:focus{ border-color:var(--primary); box-shadow:0 0 0 3px rgba(108,92,231,0.1); }
        .form-group textarea{ width:100%; padding:14px 18px; border:1px solid var(--border); border-radius:var(--radius-md); font-size:14px; background:var(--card-bg); color:var(--text-color); outline:none; min-height:120px; resize:vertical; }
        .form-group textarea:focus{ border-color:var(--primary); box-shadow:0 0 0 3px rgba(108,92,231,0.1); }
        .form-group label{ font-size:13px; color:var(--sub-text); margin-bottom:8px; display:block; }
        
        .upload-toggle-box{ text-align:center; margin-bottom:20px; }
        #uploadToggle{ padding:12px 30px; background:var(--card-bg); border:1px solid var(--border); border-radius:var(--radius-md); color:var(--text-color); font-size:14px; cursor:pointer; }
        #uploadToggle:hover{ border-color:var(--primary); color:var(--primary); }
        .hide-upload{ display:none; }
        
        .empty-tip{ text-align:center; padding:80px 20px; color:var(--sub-text); font-size:18px; }
        
        .read-page{
            position:fixed; top:0; left:0; right:0; bottom:0; width:100vw; height:100vh;
            background:var(--bg); z-index:9999;
            display:none; flex-direction:column; align-items:center; justify-content:flex-start;
            padding:40px 20px 80px; overflow-y:auto; margin:0;
        }
        .read-page.show{ display:flex; }
        .read-back-btn{
            position:fixed; top:25px; left:25px; padding:12px 28px;
            border-radius:var(--radius-xl); border:none; background:var(--primary-gradient); color:#fff;
            font-size:15px; cursor:pointer; box-shadow:0 4px 15px rgba(141,110,99,0.3);
            z-index:10; transition:all 0.3s ease; font-weight:500;
        }
        .read-back-btn:hover{ transform:translateY(-3px); box-shadow:0 6px 20px rgba(141,110,99,0.4); }
        .read-content{ max-width:700px; width:100%; text-align:center; padding-top:80px; padding-bottom:50px; }
        .read-cover{ width:100%; max-width:350px; border-radius:var(--radius-lg); box-shadow:var(--shadow-hover); margin:0 auto 30px; border:1px solid var(--border); }
        .read-title{ font-size:32px; font-weight:700; margin-bottom:15px; color:var(--text-color); line-height:1.3; }
        .read-cate{ font-size:14px; color:var(--primary); padding:5px 14px; background:rgba(108,92,231,0.1); border-radius:var(--radius-md); display:inline-block; margin-bottom:15px; font-weight:500; }
        .read-tags{ display:flex; flex-wrap:wrap; justify-content:center; gap:6px; margin:10px 0 15px; }
        .read-tag{ font-size:12px; color:var(--primary); padding:4px 10px; background:rgba(108,92,231,0.08); border-radius:var(--radius-md); font-weight:500; }
        .read-desc{ font-size:16px; color:var(--text-color); line-height:1.8; margin:20px 0; padding:15px; background:rgba(141,110,99,0.05); border-radius:var(--radius-md); direction:rtl; text-align:justify; unicode-bidi:plaintext; }
        .read-actions{ display:flex; gap:18px; justify-content:center; margin:25px 0; flex-wrap:wrap; }
        .read-btn{ padding:14px 28px; border-radius:var(--radius-xl); background:var(--primary-gradient); color:white; border:none; cursor:pointer; font-size:15px; transition:all 0.3s; font-weight:500; min-width:150px; display:flex; align-items:center; justify-content:center; gap:8px; }
        .read-btn:hover{ transform:translateY(-3px); box-shadow:0 6px 15px rgba(0,0,0,0.2); }
        
        .edit-modal{ background:var(--card-bg); border-radius:var(--radius-lg); padding:30px; max-width:600px; width:100%; max-height:90vh; overflow-y:auto; position:relative; }
        .edit-modal h2{ font-size:22px; margin-bottom:25px; color:var(--text-color); }
        .modal-close-btn{ position:absolute; top:15px; right:15px; background:none; border:none; color:var(--text-color); font-size:28px; cursor:pointer; width:35px; height:35px; display:flex; align-items:center; justify-content:center; border-radius:50%; transition:background 0.2s; }
        .modal-close-btn:hover{ background:rgba(0,0,0,0.1); }
        
        .login-modal{ background:var(--card-bg); border-radius:var(--radius-lg); padding:50px 40px 40px; max-width:400px; width:100%; position:relative; text-align:center; }
        .login-modal h2{ font-size:24px; margin-bottom:30px; color:var(--text-color); }
        .login-modal input{ width:100%; padding:14px 18px; border:1px solid var(--border); border-radius:var(--radius-md); font-size:14px; background:var(--card-bg); color:var(--text-color); outline:none; margin-bottom:20px; }
        .login-modal input:focus{ border-color:var(--primary); box-shadow:0 0 0 3px rgba(108,92,231,0.1); }
        .login-modal button{ width:100%; padding:14px; background:var(--primary-gradient); border:none; border-radius:var(--radius-md); color:#fff; font-size:16px; font-weight:600; cursor:pointer; }
        
        .toast{ position:fixed; top:20px; right:20px; padding:16px 24px; border-radius:var(--radius-md); color:#fff; font-size:14px; font-weight:600; z-index:20000; animation:slideIn 0.3s ease; }
        .toast-success{ background:var(--success); }
        .toast-error{ background:var(--error); }
        .toast-info{ background:var(--info); }
        @keyframes slideIn{ from{ transform:translateX(100%); opacity:0; } to{ transform:translateX(0); opacity:1; } }
        
        .yazmilar-list{ display:flex; flex-direction:column; gap:25px; max-width:800px; margin:0 auto; }
        .yazmilar-item{ background:var(--card-bg); border-radius:var(--radius-lg); padding:30px 40px; box-shadow:var(--shadow); position:relative; transition:transform 0.3s ease, box-shadow 0.3s ease; cursor:pointer; }
        .yazmilar-item:hover{ transform:translateX(8px); box-shadow:var(--shadow-hover); }
        .yazmilar-text{ font-size:17px; color:var(--text-color); line-height:1.8; text-align:justify; margin-bottom:15px; }
        .yazmilar-meta{ display:flex; justify-content:space-between; align-items:center; }
        .yazmilar-tags{ display:flex; flex-wrap:wrap; gap:6px; }
        .yazmilar-tag{ font-size:11px; color:var(--primary); padding:2px 8px; background:rgba(108,92,231,0.1); border-radius:var(--radius-sm); }
        
        .carousel-container{ position:relative; width:100%; max-width:1200px; margin:0 auto 30px; overflow:hidden; border-radius:var(--radius-lg); }
        .carousel{ display:flex; transition:transform 0.5s ease; }
        .carousel-slide{ min-width:100%; height:400px; position:relative; cursor:pointer; }
        .carousel-slide img{ width:100%; height:100%; object-fit:cover; }
        .carousel-overlay{ position:absolute; top:0; left:0; right:0; bottom:0; background:transparent; }
        .carousel-caption{ position:absolute; bottom:40px; left:40px; color:#fff; text-shadow:0 2px 8px rgba(0,0,0,0.5); }
        .carousel-caption h3{ font-size:28px; margin-bottom:10px; }
        .carousel-caption p{ font-size:16px; opacity:0.9; }
        .carousel-controls{ position:absolute; top:50%; transform:translateY(-50%); width:100%; display:flex; justify-content:space-between; padding:0 10px; pointer-events:none; }
        .carousel-controls button{ width:36px; height:36px; border:none; border-radius:50%; background:rgba(255,255,255,0.2); color:#fff; font-size:14px; cursor:pointer; opacity:0.6; transition:all 0.3s ease; pointer-events:auto; }
        .carousel-controls button:hover{ background:rgba(255,255,255,0.4); opacity:1; }

        function goToBookshelf(){
            document.getElementById('welcomePage').classList.add('hidden');
            document.getElementById('bookshelfPage').classList.add('active');
            document.getElementById('bookshelfPage').classList.remove('hidden');
            renderBooks();
        }
        
        function goToWelcome(){
            document.getElementById('bookshelfPage').classList.remove('active');
            document.getElementById('bookshelfPage').classList.add('hidden');
            document.getElementById('welcomePage').classList.remove('hidden');
        }

        function loadWelcomeData(){
            try{ const saved = localStorage.getItem(WELCOME_STORAGE_KEY); if(saved) welcomeData = JSON.parse(saved); }catch(e){}
        }

        function saveWelcomeData(){
            try{ localStorage.setItem(WELCOME_STORAGE_KEY, JSON.stringify(welcomeData)); showToast('✅ 保存成功！', 'success'); }catch(e){ showToast('❌ 保存失败', 'error'); }
        }

        function updateWelcomePage(){
            document.getElementById('welcomeTopLabel').textContent = welcomeData.topLabel;
            document.getElementById('welcomePageTitle').textContent = welcomeData.pageTitle;
            const metaInfoList = Array.isArray(welcomeData.metaInfo) ? welcomeData.metaInfo : [welcomeData.metaInfo];
            const randomMeta = metaInfoList[Math.floor(Math.random() * metaInfoList.length)];
            document.getElementById('welcomeMetaInfo').textContent = randomMeta || '';
            renderWelcomeBooks(welcomeData.books);
        }

        function renderWelcomeBooks(books){
            const shuffled = [...books].sort(() => Math.random() - 0.5);
            const displayed = shuffled.slice(0, 4);
            document.getElementById('welcomeBooksContainer').innerHTML = displayed.map(book => `<div class="welcome-book-cover" onclick="openBookLink('${book.link}')"><img src="${book.cover}" alt="${escapeHtml(book.title)}"></div>`).join('');
        }
        
        function openBookLink(link){
            if(link && link.trim()){
                window.open(link, '_blank');
            }else{
                goToBookshelf();
            }
        }

            document.body.appendChild(modal);
        }

        function selectWelcomeBookPreview(index){
            document.querySelectorAll('.welcome-preview-item').forEach((p,i) => p.classList.toggle('selected', i === index));
        }
        
        function updateMetaInfo(index, value){
            if(!Array.isArray(welcomeData.metaInfo)) welcomeData.metaInfo = [welcomeData.metaInfo];
            welcomeData.metaInfo[index] = value.trim();
        }
        
        function removeMetaInfo(index){
            if(!Array.isArray(welcomeData.metaInfo)) welcomeData.metaInfo = [welcomeData.metaInfo];
            welcomeData.metaInfo.splice(index, 1);
            updateMetaPreview();
        }
        
        function addMetaInfo(){
            const newMeta = document.getElementById('newMetaInfo').value.trim();
            if(!newMeta) return;
            if(!Array.isArray(welcomeData.metaInfo)) welcomeData.metaInfo = [welcomeData.metaInfo];
            welcomeData.metaInfo.push(newMeta);
            document.getElementById('newMetaInfo').value = '';
            updateMetaPreview();
        }
        
        function updateMetaPreview(){
            const metaInfoList = Array.isArray(welcomeData.metaInfo) ? welcomeData.metaInfo : [welcomeData.metaInfo];
            document.getElementById('editWelcomeMetaPreview').innerHTML = metaInfoList.map((m,i) => `<div class="welcome-meta-item"><input type="text" value="${escapeHtml(m)}" onchange="updateMetaInfo(${i}, this.value)"><button class="welcome-remove-btn" onclick="removeMetaInfo(${i})">×</button></div>`).join('');
        }

        function addWelcomeBook(){
            const cover = document.getElementById('newBookCover').value.trim();
            const link = document.getElementById('newBookLink').value.trim();
            if(!cover){ showToast('请填写封面图片链接！', 'error'); return; }
            welcomeData.books.push({ title: '', author: '', cover: cover, link: link });
            document.getElementById('newBookCover').value = '';
            document.getElementById('newBookLink').value = '';
            updateWelcomeEditPreview();
        }

        function removeWelcomeBook(index){
            welcomeData.books.splice(index, 1);
            updateWelcomeEditPreview();
        }
        
        function openEditBookModal(index){
            const book = welcomeData.books[index];
            if(!book) return;
            const editModal = document.createElement('div');
            editModal.className = 'modal-overlay';
            editModal.innerHTML = `<div class="welcome-modal-content"><button class="welcome-close-modal-btn" onclick="this.closest('.modal-overlay').remove()">×</button><h2 class="welcome-modal-title">✏️ 编辑封面</h2><div class="welcome-form-group"><label>封面图片链接</label><input type="text" id="editBookCover" value="${escapeHtml(book.cover)}"></div><div class="welcome-form-group"><label>阅读链接地址（可选）</label><input type="text" id="editBookLink" value="${escapeHtml(book.link || '')}"></div><button class="welcome-save-btn" onclick="saveEditBook(${index})">保存修改</button></div>`;
            document.body.appendChild(editModal);
        }
        
        function saveEditBook(index){
            const book = welcomeData.books[index];
            if(!book) return;
            const cover = document.getElementById('editBookCover').value.trim();
            const link = document.getElementById('editBookLink').value.trim();
            if(!cover){ showToast('请填写封面图片链接！', 'error'); return; }
            book.cover = cover;
            book.link = link;
            document.querySelector('.modal-overlay:last-child').remove();
            updateWelcomeEditPreview();
        }

        function updateWelcomeEditPreview(){
            document.getElementById('editWelcomeBooksPreview').innerHTML = welcomeData.books.map((b,i) => `<div class="welcome-preview-item" onclick="selectWelcomeBookPreview(${i})"><img src="${b.cover}" alt="${escapeHtml(b.title)}"><button class="welcome-edit-btn" onclick="event.stopPropagation();openEditBookModal(${i})">✏️</button><button class="welcome-remove-btn" onclick="event.stopPropagation();removeWelcomeBook(${i})">×</button><div class="welcome-link-info">${escapeHtml(b.link || '(无链接)')}</div></div>`).join('');
        }

        function saveWelcomeEdit(){
            welcomeData.topLabel = document.getElementById('editWelcomeTopLabel').value;
            welcomeData.pageTitle = document.getElementById('editWelcomePageTitle').value;
            saveWelcomeData();
            updateWelcomePage();
            document.querySelector('.modal-overlay').remove();
        }

            const title = document.getElementById('book-title').value.trim();
            const cate = document.getElementById('book-category').value;
            if(!title || !cate){ showToast('请填写书名和分类！', 'error'); return; }
            const newId = allBooks.length > 0 ? Math.max(...allBooks.map(b => b.id)) + 1 : 1;
            allBooks.push({
                id: newId, title: title, cate: cate,
                desc: document.getElementById('book-desc').value.trim(),
                tags: document.getElementById('book-tags').value.trim(),
                link: document.getElementById('book-link').value.trim(),
                cover: document.getElementById('book-cover').value.trim() || 'https://via.placeholder.com/150x240?text=Cover',
                bookFile: '', audioFile: '', isTop: false, topOrder: 0
            });
            saveBooks(); renderBooks();
            document.getElementById('book-title').value = ''; document.getElementById('book-category').value = '';
            document.getElementById('book-desc').value = ''; document.getElementById('book-tags').value = '';
            document.getElementById('book-link').value = ''; document.getElementById('book-cover').value = '';
            toggleUploadBox(); showToast('✅ 书籍添加成功！', 'success');
        }

        function saveBooks(){ localStorage.setItem('allBooks', JSON.stringify(allBooks)); }
        function loadBooks(){ const saved = localStorage.getItem('allBooks'); if(saved) allBooks = JSON.parse(saved); }

        function deleteBook(id){
            if(!confirm('确定要删除这本书吗？')) return;
            allBooks = allBooks.filter(b => b.id !== id);
            saveBooks(); renderBooks(); showToast('🗑️ 书籍已删除', 'info');
        }

        function openEditModal(id){
            const book = allBooks.find(b => b.id === id);
            if(!book) return;
            const modal = document.createElement('div');
            modal.className = 'modal-overlay';
            modal.innerHTML = `<div class="edit-modal"><button class="modal-close-btn" onclick="this.closest('.modal-overlay').remove()">×</button><h2>✏️ 编辑书籍</h2><div class="form-group"><input type="text" id="edit-title" value="${escapeHtml(book.title)}" placeholder="书名"></div><div class="form-group"><select id="edit-category"><option value="Roman" ${book.cate==='Roman'?'selected':''}>Roman</option><option value="Hekaya" ${book.cate==='Hekaya'?'selected':''}>Hekaya</option><option value="Rasimlik" ${book.cate==='Rasimlik'?'selected':''}>Rasimlik</option><option value="Adibiy Aser" ${book.cate==='Adibiy Aser'?'selected':''}>Adibiy Aser</option><option value="Awazlik" ${book.cate==='Awazlik'?'selected':''}>Awazlik</option><option value="Yazmilar" ${book.cate==='Yazmilar'?'selected':''}>Yazmilar</option></select></div><div class="form-group"><textarea id="edit-desc" placeholder="简介">${escapeHtml(book.desc)}</textarea></div><div class="form-group"><input type="text" id="edit-tags" value="${escapeHtml(book.tags)}" placeholder="标签"></div><div class="form-group"><input type="text" id="edit-link" value="${escapeHtml(book.link)}" placeholder="链接"></div><div class="form-group"><input type="text" id="edit-cover" value="${escapeHtml(book.cover)}" placeholder="封面链接"></div><button class="btn-common btn-primary" onclick="saveEdit(${book.id})">✅ 保存修改</button></div>`;
            document.body.appendChild(modal);
        }

        function saveEdit(id){
            const book = allBooks.find(b => b.id === id);
            if(!book) return;
            book.title = document.getElementById('edit-title').value.trim();
            book.cate = document.getElementById('edit-category').value;
            book.desc = document.getElementById('edit-desc').value.trim();
            book.tags = document.getElementById('edit-tags').value.trim();
            book.link = document.getElementById('edit-link').value.trim();
            book.cover = document.getElementById('edit-cover').value.trim() || 'https://via.placeholder.com/150x240?text=Cover';
            saveBooks(); renderBooks();
            document.querySelector('.modal-overlay').remove();
            showToast('✅ 修改成功！', 'success');
        }

        let currentBook = null;
        function openReadPage(book){
            currentBook = book;
            const coverImg = document.getElementById('readCover');
            coverImg.src = book.cover;
            coverImg.onerror = () => { coverImg.src = 'https://via.placeholder.com/350x450?text=Cover'; };
            document.getElementById('readTitle').innerText = book.title;
            document.getElementById('readCate').innerText = book.cate;
            document.getElementById('readDesc').innerText = book.desc || '📋 无简介';
            
            const tagsContainer = document.getElementById('readTags');
            tagsContainer.innerHTML = '';
            if(book.tags){
                book.tags.split(',').forEach(tag => {
                    const tagEl = document.createElement('div');
                    tagEl.className = 'read-tag';
                    tagEl.innerText = tag.trim();
                    tagsContainer.appendChild(tagEl);
                });
            }
            
            const linkBtn = document.getElementById('readLinkBtn');
            linkBtn.style.display = book.link ? 'flex' : 'none';
            
            document.getElementById('readPage').classList.add('show');
        }
        function closeReadPage(){
            document.getElementById('readPage').classList.remove('show');
        }
        function openBookLink(){
            if(!currentBook || !currentBook.link) return;
            window.open(currentBook.link, '_blank');
        }

        function openLoginModal(){
            const modal = document.createElement('div');
            modal.className = 'modal-overlay';
            modal.innerHTML = `<div class="login-modal"><button class="modal-close-btn" onclick="this.closest('.modal-overlay').remove()">×</button><h2>🔐 管理员登录</h2><input type="password" id="adminPassword" placeholder="请输入管理员密码"><button onclick="login()">登录</button></div>`;
            document.body.appendChild(modal);
        }

        function updateAdminUI(){
            const loginBtn = document.getElementById('loginBtn');
            const logoutBtn = document.getElementById('logoutBtn');
            const uploadBtn = document.getElementById('uploadBtn');
            const exportBtn = document.getElementById('exportBtn');
            const carouselEditBtn = document.getElementById('carouselEditBtn');
            const bookshelf = document.getElementById('bookshelf');
            const uploadToggleBox = document.getElementById('uploadToggleBox');

            if(loginBtn) loginBtn.style.display = isAdminLogin ? 'none' : 'inline-block';
            if(logoutBtn) logoutBtn.style.display = isAdminLogin ? 'inline-block' : 'none';
            if(uploadBtn) uploadBtn.style.display = isAdminLogin ? 'inline-block' : 'none';
            if(exportBtn) exportBtn.style.display = isAdminLogin ? 'inline-block' : 'none';
            if(carouselEditBtn) carouselEditBtn.style.display = isAdminLogin ? 'block' : 'none';
            if(bookshelf) bookshelf.classList.toggle('admin-btns-show', isAdminLogin);
            if(uploadToggleBox) uploadToggleBox.style.display = isAdminLogin ? 'block' : 'none';
        }

        function toggleUploadBox(){
            const uploadBox = document.getElementById('uploadBox');
            uploadBoxShow = !uploadBoxShow;
            uploadBox.classList.toggle('hide-upload', !uploadBoxShow);
        }

        function showToast(message, type='info'){
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function toggleTop(id){
            const book = allBooks.find(b => b.id === id);
            if(!book) return;
            book.isTop = !book.isTop;
            book.topOrder = book.isTop ? Date.now() : 0;
            saveBooks(); renderBooks();
            showToast(book.isTop ? '📌 已置顶' : '🔽 已取消置顶', 'info');
        }

        function sortBooksData(books, sortType){
            const type = sortType || document.getElementById('sortSelect').value;
            switch(type){
                case 'title-asc': return [...books].sort((a,b) => a.title.localeCompare(b.title));
                case 'title-desc': return [...books].sort((a,b) => b.title.localeCompare(a.title));
                case 'cate-asc': return [...books].sort((a,b) => a.cate.localeCompare(b.cate));
                case 'random': return [...books].sort(() => Math.random() - 0.5);
                default: return [...books].sort((a,b) => { if(a.isTop && !b.isTop) return -1; if(!a.isTop && b.isTop) return 1; return b.topOrder - a.topOrder; });
            }
        }

        function sortBooks(){ renderBooks(); }

        function debounce(func, delay){
            let timer = null;
            return function(){ if(timer) clearTimeout(timer); timer = setTimeout(func, delay); };
        }

        function renderBooks(){
            const shelf = document.getElementById('bookshelf');
            if(!shelf) return;
            const activeCate = document.querySelector('.tab.active').dataset.cate;
            const searchText = document.getElementById('searchInput').value.toLowerCase().trim();
            
            let filteredBooks = allBooks.filter(book => {
                const excludeFromAll = activeCate === 'all' && (book.cate === 'Yazmilar' || book.cate === 'Yzamlilar');
                const cateMatch = activeCate === 'all' || book.cate === activeCate;
                const searchMatch = !searchText || book.title.toLowerCase().includes(searchText) || book.tags.toLowerCase().includes(searchText) || book.cate.toLowerCase().includes(searchText) || (book.desc && book.desc.toLowerCase().includes(searchText));
                return !excludeFromAll && cateMatch && searchMatch;
            });
            
            filteredBooks = sortBooksData(filteredBooks);
            
            const resultCount = document.getElementById('searchResultCount');
            if(resultCount) resultCount.textContent = searchText ? `🔍 搜索 "${searchText}" 找到 ${filteredBooks.length} 本书` : '';
            
            if(filteredBooks.length === 0){
                shelf.innerHTML = '<div class="empty-tip">📚 暂无匹配书籍</div>';
                return;
            }
            
            if(activeCate === 'Yazmilar'){
                renderYazmilar(filteredBooks, shelf);
            }else{
                const fragment = document.createDocumentFragment();
                filteredBooks.forEach(book => {
                    const card = document.createElement('div');
                    card.className = `book-card ${book.isTop ? 'top' : ''}`;
                    card.onclick = () => openReadPage(book);
                    const topTag = isAdminLogin && book.isTop ? '<div class="top-tag">📌 置顶</div>' : '';
                    const topBtnText = book.isTop ? '🔽' : '🔼';
                    const topBtnClass = book.isTop ? 'top-btn untop-btn' : 'top-btn';
                    const topBtnHtml = isAdminLogin ? `<button class="${topBtnClass}" onclick="event.stopPropagation();toggleTop(${book.id})">${topBtnText}</button>` : '';
                    const delBtnHtml = isAdminLogin ? `<button class="del-btn" onclick="event.stopPropagation();deleteBook(${book.id})">🗑️</button>` : '';
                    const editBtnHtml = isAdminLogin ? `<button class="edit-card-btn" onclick="event.stopPropagation();openEditModal(${book.id})">✏️</button>` : '';
                    card.innerHTML = `${topTag}<img class="book-cover lazy-img" data-src="${escapeHtml(book.cover)}" alt="${escapeHtml(book.title)}" onerror="this.src='https://via.placeholder.com/150x240?text=Cover'"><div class="book-info"><div class="book-title">${escapeHtml(book.title)}</div><div class="book-cate">${escapeHtml(book.cate)}</div></div>${topBtnHtml}${delBtnHtml}${editBtnHtml}`;
                    fragment.appendChild(card);
                });
                shelf.innerHTML = '';
                shelf.appendChild(fragment);
                initLazyLoad();
            }
        }

        function renderYazmilar(books, container){
            const yazmilarList = document.createElement('div');
            yazmilarList.className = 'yazmilar-list';
            books.forEach(book => {
                const item = document.createElement('div');
                item.className = 'yazmilar-item';
                item.onclick = () => openReadPage(book);
                const topBtnText = book.isTop ? '🔽' : '🔼';
                const topBtnClass = book.isTop ? 'top-btn untop-btn' : 'top-btn';
                const topBtnHtml = isAdminLogin ? `<button class="${topBtnClass}" onclick="event.stopPropagation();toggleTop(${book.id})">${topBtnText}</button>` : '';
                const delBtnHtml = isAdminLogin ? `<button class="del-btn" onclick="event.stopPropagation();deleteBook(${book.id})">🗑️</button>` : '';
                const editBtnHtml = isAdminLogin ? `<button class="edit-card-btn" onclick="event.stopPropagation();openEditModal(${book.id})">✏️</button>` : '';
                item.innerHTML = `<div class="yazmilar-text">${escapeHtml(book.desc) || escapeHtml(book.title)}</div><div class="yazmilar-meta"><div class="yazmilar-tags">${book.tags ? book.tags.split(',').map(t => `<span class="yazmilar-tag">${escapeHtml(t.trim())}</span>`).join('') : ''}</div></div>${topBtnHtml}${delBtnHtml}${editBtnHtml}`;
                yazmilarList.appendChild(item);
            });
            container.innerHTML = '';
            container.appendChild(yazmilarList);
        }

        const filterBooks = debounce(() => { renderBooks(); }, 300);

        let lazyLoadObserver = null;

        function initLazyLoad(){
            if(lazyLoadObserver) lazyLoadObserver.disconnect();
            const lazyImages = document.querySelectorAll('.lazy-img');
            if('IntersectionObserver' in window){
                lazyLoadObserver = new IntersectionObserver((entries, observer) => {
                    entries.forEach(entry => {
                        if(entry.isIntersecting){
                            const img = entry.target;
                            const src = img.getAttribute('data-src');
                            if(src){ img.src = src; img.classList.add('loaded'); observer.unobserve(img); }
                        }
                    });
                }, { rootMargin: '50px', threshold: 0.1 });
                lazyImages.forEach(img => lazyLoadObserver.observe(img));
            }else{
                lazyImages.forEach(img => { const src = img.getAttribute('data-src'); if(src){ img.src = src; img.classList.add('loaded'); } });
            }
        }

        function initTab(){
            const tabs = document.querySelectorAll('.tab');
            tabs.forEach(tab => {
                tab.addEventListener('click', () => {
                    tabs.forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    renderBooks();
                });
            });
        }

        function exportData(){
            const data = { books: allBooks, welcomeData: welcomeData, exportTime: new Date().toISOString() };
            const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = `hekaya-backup-${new Date().toLocaleDateString()}.json`;
            a.click(); URL.revokeObjectURL(url);
            showToast('📥 数据已导出', 'success');
        }

        

        function nextSlide(){ currentSlide = (currentSlide + 1) % slides.length; updateCarousel(); }
        function prevSlide(){ currentSlide = (currentSlide - 1 + slides.length) % slides.length; updateCarousel(); }
        function goToSlide(index){ currentSlide = index; updateCarousel(); }

        function updateCarousel(){
            const carousel = document.getElementById('carousel');
            if(carousel) carousel.style.transform = `translateX(-${currentSlide * 100}%)`;
            document.querySelectorAll('.carousel-indicator').forEach((ind, idx) => ind.classList.toggle('active', idx === currentSlide));
        }

        function openCarouselEdit(){
            if(!isAdminLogin){ showToast('请先登录管理员！', 'error'); return; }
            const existingData = slides.map(s => `${s.url}|${s.link || ''}|${s.title || ''}|${s.desc || ''}`).join('\n');
            const modal = document.createElement('div');
            modal.className = 'modal-overlay';
            modal.innerHTML = `<div class="edit-modal"><button class="modal-close-btn" onclick="this.closest('.modal-overlay').remove()">×</button><h2>✏️ 编辑轮播图</h2><div class="form-group"><label>轮播图数据 (每行一个，格式: 图片URL|跳转链接|标题|描述)</label><textarea id="carouselImages" rows="6" placeholder="https://example.com/img1.jpg|https://link.com|标题|描述">${existingData}</textarea></div><button class="btn-common btn-primary" onclick="saveCarousel()">✅ 保存</button></div>`;
            document.body.appendChild(modal);
        }

        function saveCarousel(){
            const textarea = document.getElementById('carouselImages');
            if(!textarea) return;
            const lines = textarea.value.split('\n').map(l => l.trim()).filter(l => l);
            if(lines.length === 0){ showToast('请至少输入一个图片URL！', 'error'); return; }
            const carouselData = lines.map((line, index) => {
                const parts = line.split('|');
                return {
                    url: parts[0] || '',
                    link: parts[1] || '',
                    title: parts[2] || ['欢迎来到 Hekaya', '每日推荐', '阅读分享'][index % 3] || '轮播图',
                    desc: parts[3] || ['发现精彩的维吾尔语书籍', '精选好书，每日更新', '与朋友分享阅读心得'][index % 3] || ''
                };
            });
            localStorage.setItem('carouselData', JSON.stringify(carouselData));
            renderCarousel(carouselData);
            document.querySelector('.modal-overlay').remove();
            showToast('✅ 轮播图已保存！', 'success');
        }

        function renderCarousel(data){
            slides = data;
            const carousel = document.getElementById('carousel');
            const indicators = document.getElementById('carouselIndicators');
            if(!carousel || !indicators) return;
            
            carousel.innerHTML = slides.map((slide, index) => `
                <div class="carousel-slide" onclick="openCarouselLink(${index})">
                    <img src="${escapeHtml(slide.url)}" alt="Slide ${index+1}" onerror="this.src='https://picsum.photos/1200/400?random=${index}'">
                    <div class="carousel-overlay"></div>
                    <div class="carousel-caption">
                        <h3>${escapeHtml(slide.title)}</h3>
                        <p>${escapeHtml(slide.desc)}</p>
                    </div>
                </div>
            `).join('');
            
            indicators.innerHTML = slides.map((_, index) => `
                <button class="carousel-indicator ${index === 0 ? 'active' : ''}" onclick="goToSlide(${index})"></button>
            `).join('');
            
            currentSlide = 0;
        }

        function openCarouselLink(index){
            const slide = slides[index];
            if(slide && slide.link){
                window.open(slide.link, '_blank');
            }
        }

        function loadCarouselData(){
            try{
                const saved = localStorage.getItem('carouselData');
                if(saved){
                    const data = JSON.parse(saved);
                    if(data && Array.isArray(data) && data.length > 0){
                        renderCarousel(data);
                        return;
                    }
                }
            }catch(e){}
            renderCarousel([
                { url: 'https://picsum.photos/1200/400?random=1', title: '欢迎来到 Hekaya', desc: '发现精彩的维吾尔语书籍' },
                { url: 'https://picsum.photos/1200/400?random=2', title: '每日推荐', desc: '精选好书，每日更新' },
                { url: 'https://picsum.photos/1200/400?random=3', title: '阅读分享', desc: '与朋友分享阅读心得' }
            ]);
        }

        function initPage(){
            loadTheme();
            loadBooks();
            loadWelcomeData();
            loadCarouselData();
            updateWelcomePage();
            initTab();
            initLazyLoad();
            if(sessionStorage.getItem('isAdminLogin') === 'true'){
                isAdminLogin = true;
                document.body.classList.add('admin-login');
                updateAdminUI();
            }
        }

        function login(){
            const password = document.getElementById('adminPassword').value;
            if(password === 'admin'){
                isAdminLogin = true;
                sessionStorage.setItem('isAdminLogin', 'true');
                document.body.classList.add('admin-login');
                updateAdminUI();
                renderBooks();
                document.querySelector('.modal-overlay').remove();
                showToast('✅ 登录成功！', 'success');
            }else{
                showToast('❌ 密码错误！', 'error');
            }
        }

        function welcomeLogin(){
            const password = document.getElementById('welcomeLoginPassword').value;
            if(password === 'admin'){
                isAdminLogin = true;
                sessionStorage.setItem('isAdminLogin', 'true');
                document.body.classList.add('admin-login');
                document.querySelector('.modal-overlay').remove();
                showToast('✅ 登录成功！', 'success');
                updateAdminUI();
            }else{
                showToast('❌ 密码错误！', 'error');
            }
        }

        function logout(){
            if(!confirm('确定要退出登录吗？')) return;
            isAdminLogin = false;
            sessionStorage.removeItem('isAdminLogin');
            document.body.classList.remove('admin-login');
            updateAdminUI();
            renderBooks();
            showToast('🚪 已退出登录', 'info');
        }

        function toggleTheme(){
            const isDark = document.body.classList.toggle('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            const btn = document.querySelector('.theme-toggle-btn');
            if(btn) btn.textContent = isDark ? '☀️' : '🌙';
        }

        function loadTheme(){
            const saved = localStorage.getItem('theme');
            const isDark = saved === 'dark' || saved === null;
            if(isDark){
                document.body.classList.add('dark');
                const btn = document.querySelector('.theme-toggle-btn');
                if(btn) btn.textContent = '☀️';
            }
        }

        let carouselTimer = null;

        function startCarousel(){
            carouselTimer = setInterval(nextSlide, 5000);
        }

        function stopCarousel(){
            if(carouselTimer){ clearInterval(carouselTimer); carouselTimer = null; }
        }

        document.addEventListener('DOMContentLoaded', () => {
            initPage();
            startCarousel();
        });

        document.addEventListener('keydown', (e) => {
            if(e.key === 'Escape'){
                const modal = document.querySelector('.modal-overlay');
                if(modal) modal.remove();
                const readPage = document.getElementById('readPage');
                if(readPage && readPage.classList.contains('show')) closeReadPage();
            }
        });

        document.addEventListener('click', (e) => {
            if(e.target.classList && e.target.classList.contains('modal-overlay')){
                e.target.remove();
            }
        });
    </script>
</body>
</html>
